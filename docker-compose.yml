services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DATABASE:-canterlot}
      POSTGRES_USER: ${PG_USER:-canterlot}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-canterlot}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - canterlot
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - canterlot
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
        reservations:
          memory: 32M
          cpus: "0.1"

  app:
    build: .
    env_file:
      - .env
    environment:
      PG_HOST: ${PG_HOST:-postgres}
      PG_PORT: ${PG_PORT:-5432}
      PG_DATABASE: ${PG_DATABASE:-canterlot}
      PG_USER: ${PG_USER:-canterlot}
      PG_PASSWORD: ${PG_PASSWORD:-canterlot}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - canterlot
    volumes:
      - ./backend:/app/backend
      - ./index.html:/app/index.html:ro
      - ./about.html:/app/about.html:ro
      - ./css:/app/css:ro
      - ./js:/app/js:ro
      - ./assets:/app/assets:ro
      - ./font:/app/font:ro
      - ./log/app:/app/log
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"

  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    ports:
      - "80:8080"
    volumes:
      - ./backend/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kill", "-0", "1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - canterlot
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.25"
        reservations:
          memory: 16M
          cpus: "0.1"

networks:
  canterlot:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

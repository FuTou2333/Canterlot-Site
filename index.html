<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坎特洛特 - 交通枢纽</title>
  <meta name="description" content="坎城枢纽，小马相关网址导航站，由个人爱好者组建。">
  <link rel="icon" href="./assets/favicon.png">
  <link rel="stylesheet" href="./css/canterlot-site.css">
  <link rel="stylesheet" href="./css/searchEngineSelectMenu.css">
  <link rel="stylesheet" href="./css/canterlot-site-dark.css">
</head>

<body id="body">

  <main id="main">

    <!--顶部导航条-->
    <bar_top>

      <!--设置菜单按钮-->
      <a class="bar_top_links" id="settingsButton" onclick="changeSettings()" aria-label="设置菜单按钮">⚙</a>

      <!--设置菜单-->
      <settings id="settings">

        <!--设置菜单的一个类别-->
        <settings_class>

          <!--设置菜单的一个类别的标题-->
          <settings_title>外观</settings_title>

          <!--设置菜单的一行-->
          <settings_option>
            <input type="checkbox" class="settings_form" id="darkMode" onclick="change_darkMode()">
            <label class="settings_description" for="darkMode">深色模式</label>
          </settings_option>

        </settings_class>

        <settings_class>

          <settings_title>背景</settings_title>

          <form>

            <settings_option>
              <input type="radio" name="background" class="settings_form" id="meiRiYiTu" checked>
              <label class="settings_description" for="meiRiYiTu">每日一图</label>
            </settings_option>

            <settings_option>
              <input type="radio" name="background" class="settings_form" id="ziDingYi">
              <label class="settings_description" for="ziDingYi">自定义</label>
              <div style="display:flex;flex-direction:row;display:none;" id="ziDingYiInputDiv">
                <input class="backgroundUrlInputBox" placeholder="输入图片链接" id="ziDingYiInputBox">
                <button type="button" class="applyBackgroundButton" style="display:flex;align-items:center;"
                  onclick="applyBackgroundImage()">应用</button>
              </div>
            </settings_option>

            <settings_option>
              <input type="radio" name="background" class="settings_form" id="chunSeBeiJing">
              <label class="settings_description" for="chunSeBeiJing">纯色背景</label>
            </settings_option>

          </form>

        </settings_class>

        <settings_class>

          <settings_title>页面布局</settings_title>

          <settings_option>
            <input type="checkbox" class="settings_form" id="xianShiDaoHang" onclick="change_xianShiDaoHang()" checked>
            <label class="settings_description" for="xianShiDaoHang">显示导航</label>
          </settings_option>

          <settings_option>
            <input type="checkbox" class="settings_form" id="xianShiFangWenLiang"
              onclick="changeElementHideOrShow(this.id)" checked>
            <label class="settings_description" for="xianShiFangWenLiang">显示访问量</label>
          </settings_option>

        </settings_class>

        <!--设置菜单中的按钮-->
        <div style="display:flex;justify-content: center;">
          <a class="settings_button" style="margin-right:5px;" onclick="setDefultSettings();">恢复默认</a>
          <a href="./about.html" target="_blank" class="settings_button" style="margin-left:5px;">关于本站</a>
        </div>

      </settings>

    </bar_top>

    <!--搜索框上面的标题-->
    <big_title_container>
      <!--时间显示-->
      <span id="displayTime" style="font-size: 46px;font-family: 'HarmonyOS_Sans_Regular';"></span>
      <!--显示访问次数和独立IP访问量-->
      <span style="font-weight: bold;display: none;" id="xianShiFangWenLiang_Target">
        <span id="busuanzi_container_site_pv" style="margin-right:10px;">
          访问量：<span id="busuanzi_value_site_pv"></span>
        </span>
        <span id="busuanzi_container_site_uv">
          访客量：<span id="busuanzi_value_site_uv"></span>
        </span>
      </span>
    </big_title_container>

    <!--时间显示js-->
    <script>
      function getTime() {
        let rawTime = Date().slice(16, 21); //从Date()返回的一大串东西中截取到XX:XX格式的时间
        if (rawTime.slice(0, 1) === "0") {  //如果小时的第一位是0，则去掉
          var time = rawTime.slice(1, 5);
        } else {
          var time = rawTime; //如果第一位不是0则直接输出
        }
        document.getElementById("displayTime").innerHTML = time;
      }
      getTime(); //先执行一次getTime()
      setInterval("getTime()", 1000); //以后每秒执行一次getTime()
    </script>

    <!--搜索框-->
    <div class="search_box">
      <div class="menu">
        <div class="menu-list">
          <button class="menu-item" onfocus="setSearchEngine('百度')">
            <img src="./assets/engineBaidu.svg">
            <span>百度</span>
          </button>
          <button class="menu-item" onfocus="setSearchEngine('必应')">
            <img src="./assets/engineBing.svg">
            <span>必应</span>
          </button>
          <button class="menu-item" onfocus="setSearchEngine('Derpibooru图片')">
            <img src="./assets/engineDerpibooru.svg">
            <span>Derpibooru图片</span>
          </button>
          <button class="menu-item" onfocus="setSearchEngine('FimTale小说')">
            <img src="./assets/engineFimtale.ico">
            <span>FimTale小说</span>
          </button>
          <button class="menu-item" onfocus="setSearchEngine('EqCN资讯')">
            <img src="./assets/equestriacn.ico">
            <span>EqCN资讯</span>
          </button>
        </div>
      </div>
      <button class="button_in_search_box" onclick="openMenu(event)" onblur="closeMenu()" aria-label="切换搜索引擎">
        <img src="./assets/engineBaidu.svg" id="searchEngineIcon">
      </button>
      <form action="https://www.baidu.com/s" target="_blank" id="searchEngineForm">
        <input id="searchEngineInput" name="wd" aria-label="输入搜索内容">
        <button type="submit" class="button_in_search_box" aria-label="搜索按钮">
          <img src="./assets/search.svg" class="search_button_img">
        </button>
      </form>
    </div>

    <!--导航-->
    <nav id="nav">

      <!--导航分类（按钮由 JS 动态生成）-->
      <nav_select id="navSelect"></nav_select>

      <!--导航链接-->
      <nav_links id="navLinksContainer">
      </nav_links>

    </nav>

  </main>

  <!--导入导航js-->
  <script src="./js/selectNav.js"></script>

  <!--导入设置js-->
  <script src="./js/settings.js"></script>

  <!--导入搜索引擎切换js-->
  <script src="./js/searchEngineSelectMenu.js"></script>

  <!--不蒜子访问量统计脚本-->
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</body>

</html>

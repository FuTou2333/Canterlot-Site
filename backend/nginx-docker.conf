# Nginx config for Docker deployment

# Use Docker's embedded DNS to resolve container hostnames dynamically
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 8080;
    server_name _;

    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Use variable-based proxy_pass to force DNS re-resolution (avoids stale IP cache)
    location / {
        set $upstream app:8000;
        proxy_pass http://$upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
